  </g>
  <g fill="#fff" stroke="#1f6feb" stroke-width="5">
    <circle cx="510" cy="236" r="18"/>
    <circle cx="700" cy="220" r="18"/>
    <circle cx="838" cy="220" r="18"/>
  </g>
  <g fill="#fff" stroke="#6979f8" stroke-width="5">
